<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Fidelity WebRTC Chat</title>
    <script src="peerjs.min.js"></script>
    <style>
        /* Modern Dark Theme */
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Sidebar (Login & Users) */
        .sidebar { width: 250px; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; position: relative; }
        .main-area { flex: 1; display: flex; flex-direction: column; height: 100%; }

        /* Login Section */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none; margin-bottom: 10px; width: 200px; text-align: center; }
        button { padding: 12px 24px; border-radius: 8px; border: none; background: #00e676; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        /* Sidebar Controls */
        .sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        #logout-btn { background: #d32f2f; color: white; padding: 8px; width: 100%; font-size: 13px; }

        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: #00e676; color: black; border-bottom-right-radius: 2px; }
        .msg.theirs { align-self: flex-start; background: #333; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .msg-info { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }

        /* Input Area */
        .input-bar { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        #msg-input { flex: 1; text-align: left; }
        
        /* Utility Buttons */
        .icon-btn { background: transparent; color: #888; font-size: 20px; padding: 5px 10px; }
        .icon-btn:hover { background: #333; color: white; }
        
        #mute-btn { background: #252525; color: #00e676; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 20px; padding: 0; }
        #mute-btn.muted { background: #d32f2f; color: white; }

        /* File Input Styling */
        .file-label { cursor: pointer; font-size: 20px; padding: 10px; color: #888; }
        .file-label:hover { color: white; }
        
        /* User List */
        .user-item { padding: 10px; background: #252525; margin-bottom: 5px; border-radius: 5px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; background: #00e676; border-radius: 50%; }

        /* Searching Animation */
        #searching-container { margin-top: 20px; padding: 20px; text-align: center; color: #666; font-size: 13px; display: none; flex-direction: column; align-items: center; gap: 15px; }
        .radar { width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 230, 118, 0.2); position: relative; }
        .radar::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: #00e676; border-radius: 50%; box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 230, 118, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>🚀 Super Chat</h1>
        <p style="color:#888;">High Quality Voice + Text + Files</p>
        <input type="text" id="username" placeholder="Your Name">
        <input type="password" id="room-pass" placeholder="Room Password">
        <button id="join-btn">Join Room</button>
    </div>

    <div class="sidebar">
        <h3>👥 Users</h3>
        <div id="user-list"></div>
        
        <div id="searching-container">
            <div class="radar"></div>
            <div>Searching for peer...<br><span style="font-size:11px; opacity:0.6;">Share password to invite</span></div>
        </div>

        <div class="sidebar-footer">
            <div style="color: #666; font-size: 12px; text-align: center;">
                Status: <span id="conn-status" style="color: #ffeb3b;">Waiting...</span>
            </div>
            <button id="logout-btn">Logout</button>
        </div>
    </div>

    <div class="main-area">
        <div id="messages"></div>
        <div class="input-bar">
            <button id="mute-btn" title="Toggle Mic">🎤</button>
            <input type="file" id="file-input" style="display: none;">
            <label for="file-input" class="file-label" title="Send File/Photo">📎</label>
            <input type="text" id="msg-input" placeholder="Type a message..." disabled>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script>
        // --- NATIVE WEB AUDIO SFX ---
        function playBeep(freq, type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } catch (e) { }
        }
        const playJoinSound = () => playBeep(880, 'sine'); 
        const playLeaveSound = () => playBeep(440, 'triangle'); 

        // --- DOM Elements ---
        const loginScreen = document.getElementById('login-screen');
        const userList = document.getElementById('user-list');
        const searchingUI = document.getElementById('searching-container');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const muteBtn = document.getElementById('mute-btn');
        const statusText = document.getElementById('conn-status');

        // --- State ---
        let myName = "";
        let theirName = "Unknown Peer";
        let localStream = null;
        let isMuted = false;
        
        let peer;           // Our PeerJS instance
        let chatConn;       // The active data connection

        // File Receiving State
        let incomingFileMeta = null;
        let fileChunks = [];
        let bytesReceived = 0;

        // Optimized WebRTC Configuration
        const peerConfig = {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        // --- Initialize ---
        document.getElementById('join-btn').onclick = async () => {
            myName = document.getElementById('username').value.trim() || "Anon";
            const userPasswordInput = document.getElementById('room-pass').value.trim();
            
            const STATIC_PASSWORD = "secretpassword";
            if (userPasswordInput !== STATIC_PASSWORD) {
                return alert("Incorrect password! Access denied.");
            }

            const ROOM_ID = "superchat-room-v1-" + STATIC_PASSWORD;

            // 1. Get Audio (Forced Studio Quality)
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000
                    } 
                });
            } catch (err) {
                console.warn("No mic found or permission denied.");
                muteBtn.style.display = 'none'; 
            }

            // 2. UI Updates
            loginScreen.style.display = 'none';
            addSystemMsg(`You joined as <b>${myName}</b>`);
            addUserToSidebar("You (Me)", "me");
            searchingUI.style.display = 'flex';

            // 3. Connect to PeerJS with custom STUN servers
            peer = new Peer(ROOM_ID, peerConfig);

            // IF WE ARE THE HOST:
            peer.on('open', (id) => {
                console.log("Room Created! Waiting for guest...");
                
                peer.on('connection', (conn) => {
                    setupDataConnection(conn);
                });

                peer.on('call', (call) => {
                    call.answer(localStream); 
                    call.on('stream', (remoteStream) => {
                        const audio = new Audio();
                        audio.srcObject = remoteStream;
                        audio.autoplay = true;
                    });
                });
            });

            // IF THE ROOM ALREADY EXISTS (WE ARE THE GUEST):
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    console.log("Room already exists! Joining as Guest...");
                    
                    peer = new Peer(peerConfig); 
                    
                    peer.on('open', () => {
                        const conn = peer.connect(ROOM_ID);
                        setupDataConnection(conn);

                        if (localStream) {
                            const call = peer.call(ROOM_ID, localStream);
                            call.on('stream', (remoteStream) => {
                                const audio = new Audio();
                                audio.srcObject = remoteStream;
                                audio.autoplay = true;
                            });
                        }
                    });
                } else {
                    alert("Connection error: " + err.type);
                }
            });
        };

        // --- Networking Logic ---
        function setupDataConnection(conn) {
            chatConn = conn;
            
            chatConn.on('open', () => {
                searchingUI.style.display = 'none';
                statusText.innerText = "Connected";
                statusText.style.color = "#00e676";
                msgInput.disabled = false;
                sendBtn.disabled = false;
                
                chatConn.send({ type: 'name', value: myName });
            });

            chatConn.on('data', (data) => {
                if (data.type === 'name') {
                    theirName = data.value;
                    addUserToSidebar(theirName, 'them');
                    addSystemMsg(`<b>${theirName}</b> joined the room.`);
                    playJoinSound();
                } else if (data.type === 'text') {
                    addMessage(data.value, theirName, 'theirs');
                } else if (data.type === 'file-meta') {
                    // Prepare to receive chunks
                    incomingFileMeta = data;
                    fileChunks = [];
                    bytesReceived = 0;
                    addSystemMsg(`Receiving ${data.name}...`);
                } else if (data.type === 'file-chunk') {
                    // Accumulate file chunks
                    fileChunks.push(data.data);
                    bytesReceived += data.data.byteLength;
                    
                    // If we have received all bytes, reconstruct the file!
                    if (bytesReceived >= incomingFileMeta.size) {
                        const blob = new Blob(fileChunks, { type: incomingFileMeta.fileType });
                        const url = URL.createObjectURL(blob);
                        
                        if (incomingFileMeta.fileType.startsWith('image/')) {
                            addMessage(`<img src="${url}">`, theirName, 'theirs');
                        } else {
                            addMessage(`<div>📂 ${incomingFileMeta.name}</div><a href="${url}" download="${incomingFileMeta.name}" style="color: #00e676; display:block; margin-top:5px;">Download</a>`, theirName, 'theirs');
                        }
                        
                        // Reset receiver state
                        incomingFileMeta = null;
                        fileChunks = [];
                        bytesReceived = 0;
                    }
                }
            });

            chatConn.on('close', () => {
                addSystemMsg(`<b>${theirName}</b> left the room.`);
                playLeaveSound();
                document.getElementById('sidebar-them')?.remove();
                statusText.innerText = "Disconnected";
                statusText.style.color = "#f44336";
                searchingUI.style.display = 'flex';
                msgInput.disabled = true;
                sendBtn.disabled = true;
            });
        }

        // --- Chat UI & Actions ---
        sendBtn.onclick = () => {
            const text = msgInput.value;
            if (!text || !chatConn || !chatConn.open) return;
            
            chatConn.send({ type: 'text', value: text });
            addMessage(text, "You", 'mine');
            msgInput.value = "";
        };

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Advanced File Transfer (Chunking)
        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if (!file || !chatConn || !chatConn.open) return;
            
            addSystemMsg(`Sending ${file.name}...`);
            
            // 1. Send Metadata first
            chatConn.send({ type: 'file-meta', name: file.name, fileType: file.type, size: file.size });
            
            // 2. Read and slice the file into 16KB chunks
            const chunkSize = 16 * 1024; // 16KB
            let offset = 0;
            
            while (offset < file.size) {
                const chunk = file.slice(offset, offset + chunkSize);
                const buffer = await chunk.arrayBuffer();
                
                // Safety check: Prevent overflowing WebRTC's buffer (Wait if buffer > 1MB)
                while (chatConn.dataChannel.bufferedAmount > 1024 * 1024) {
                    await new Promise(r => setTimeout(r, 50));
                }
                
                // Send the raw binary chunk
                chatConn.send({ type: 'file-chunk', data: buffer });
                offset += chunkSize;
            }
            
            // 3. Post a message to our own screen once done
            if (file.type.startsWith('image/')) {
                const localUrl = URL.createObjectURL(file);
                addMessage(`<img src="${localUrl}">`, "You sent a photo", 'mine');
            } else {
                addMessage(`<div>📂 Shared file: ${file.name}</div>`, "You", 'mine');
            }
            fileInput.value = ""; 
        };

        muteBtn.onclick = () => {
            if (!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            isMuted = !isMuted;
            audioTrack.enabled = !isMuted;
            muteBtn.innerHTML = isMuted ? "🔇" : "🎤";
            if (isMuted) muteBtn.classList.add('muted');
            else muteBtn.classList.remove('muted');
        };

        document.getElementById('logout-btn').onclick = () => {
            if (peer) peer.destroy();
            location.reload(); 
        };

        // --- UI Helpers ---
        function addMessage(content, user, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<div class="msg-info">${user}</div><div>${content}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMsg(text) {
            const div = document.createElement('div');
            div.style.textAlign = "center"; div.style.fontSize = "12px"; div.style.color = "#666"; div.style.margin = "10px 0";
            div.innerHTML = text;
            messagesDiv.appendChild(div);
        }

        function addUserToSidebar(name, id) {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = `sidebar-${id}`;
            div.innerHTML = `<div class="status-dot"></div> <span>${name}</span>`;
            userList.appendChild(div);
        }
    </script>
</body>
</html>
