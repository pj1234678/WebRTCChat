<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Fidelity WebRTC Conference</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Modern Dark Theme */
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Sidebar (Login & Users) */
        .sidebar { width: 280px; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; position: relative; }
        .main-area { flex: 1; display: flex; flex-direction: column; height: 100%; }

        /* Login Section */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none; margin-bottom: 10px; width: 200px; text-align: center; }
        button { padding: 12px 24px; border-radius: 8px; border: none; background: #00e676; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        /* Sidebar Controls */
        .sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        #logout-btn { background: #d32f2f; color: white; padding: 8px; width: 100%; font-size: 13px; border-radius: 8px; cursor: pointer; border: none; }

        /* Video Grid (NEW) */
        #video-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px 20px 0 20px; overflow-y: auto; max-height: 40vh; }
        .screen-video { max-height: 300px; flex: 1 1 300px; background: #000; border-radius: 8px; object-fit: contain; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: #00e676; color: black; border-bottom-right-radius: 2px; }
        .msg.theirs { align-self: flex-start; background: #333; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .msg-info { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }

        /* Input Area */
        .input-bar { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        #msg-input { flex: 1; text-align: left; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none; }
        
        /* Utility Buttons */
        .media-btn { background: #252525; color: #00e676; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 20px; padding: 0; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; }
        .media-btn:hover { background: #333; }
        .media-btn.active { background: #d32f2f; color: white; }

        /* File Input Styling */
        .file-label { cursor: pointer; font-size: 20px; padding: 10px; color: #888; }
        .file-label:hover { color: white; }
        
        /* User List & Badges */
        .user-item { padding: 10px; background: #252525; margin-bottom: 5px; border-radius: 5px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
        .user-left { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; background: #00e676; border-radius: 50%; }
        
        .ping-display { font-size: 11px; color: #888; background: #111; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .ping-good { color: #00e676; }
        .ping-med { color: #ffeb3b; }
        .ping-bad { color: #d32f2f; }

        /* Role Badges */
        .host-badge { font-size: 10px; color: #ff9800; background: rgba(255, 152, 0, 0.2); padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .guest-badge { font-size: 10px; color: #888; background: rgba(136, 136, 136, 0.2); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }

        /* Searching Animation */
        #searching-container { margin-top: 20px; padding: 20px; text-align: center; color: #666; font-size: 13px; display: none; flex-direction: column; align-items: center; gap: 15px; }
        .radar { width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 230, 118, 0.2); position: relative; }
        .radar::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: #00e676; border-radius: 50%; box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 230, 118, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>🚀 Super Mesh Chat</h1>
        <p style="color:#888;">Multi-User Conference Room</p>
        <input type="text" id="username" placeholder="Your Name">
        <input type="password" id="room-pass" placeholder="Room Password">
        <button id="join-btn">Join Room</button>
    </div>

    <div class="sidebar">
        <h3>👥 Conference Roster</h3>
        <div id="user-list"></div>
        
        <div id="searching-container">
            <div class="radar"></div>
            <div>Waiting for peers...<br><span style="font-size:11px; opacity:0.6;">Share password to invite</span></div>
        </div>

        <div class="sidebar-footer">
            <div style="color: #666; font-size: 12px; text-align: center;">
                Network: <span id="conn-status" style="color: #ffeb3b;">Connecting...</span>
            </div>
            <button id="logout-btn">Leave Room</button>
        </div>
    </div>

    <div class="main-area">
        <div id="video-grid"></div> <div id="messages"></div>
        <div class="input-bar">
            <button id="mute-btn" class="media-btn" title="Toggle Mic">🎤</button>
            <button id="screen-btn" class="media-btn" title="Share Screen">🖥️</button>
            <input type="file" id="file-input" style="display: none;">
            <label for="file-input" class="file-label" title="Send File/Photo">📎</label>
            <input type="text" id="msg-input" placeholder="Type a message..." disabled>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

<script>
        // --- NATIVE WEB AUDIO SFX ---
        function playBeep(freq, type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } catch (e) { }
        }
        const playJoinSound = () => playBeep(880, 'sine'); 
        const playLeaveSound = () => playBeep(440, 'triangle'); 

        // --- DOM Elements ---
        const loginScreen = document.getElementById('login-screen');
        const userList = document.getElementById('user-list');
        const searchingUI = document.getElementById('searching-container');
        const videoGrid = document.getElementById('video-grid');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const muteBtn = document.getElementById('mute-btn');
        const screenBtn = document.getElementById('screen-btn');
        const statusText = document.getElementById('conn-status');
        const usernameInput = document.getElementById('username');
        const roomPassInput = document.getElementById('room-pass');
        const joinBtn = document.getElementById('join-btn');

        // --- Mesh Networking State ---
        let myName = "";
        let myId = "";
        let isHost = false;
        let peer;            
        let ROOM_ID = ""; 
        
        let localStream = null;
        let isMuted = false;
        
        let screenStream = null;
        let screenCalls = {}; // Keep track of outbound screenshare calls

        const connections = {}; 
        const peerNames = {};   
        const fileTransfers = {}; 

        const peerConfig = {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        const triggerLoginOnEnter = (e) => { if (e.key === 'Enter') joinBtn.click(); };
        usernameInput.addEventListener('keypress', triggerLoginOnEnter);
        roomPassInput.addEventListener('keypress', triggerLoginOnEnter);

        // --- Initialize ---
        joinBtn.onclick = async () => {
            myName = usernameInput.value.trim() || "Anon";
            const userPasswordInput = roomPassInput.value.trim();
            const STATIC_PASSWORD = "secretpassword"; 
            
            if (userPasswordInput !== STATIC_PASSWORD) return alert("Incorrect password! Access denied.");
            ROOM_ID = "superconf-mesh-" + STATIC_PASSWORD;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
            } catch (err) {
                console.warn("No mic found or permission denied.");
                muteBtn.style.display = 'none'; 
            }

            loginScreen.style.display = 'none';
            statusText.innerText = "Initializing...";
            initPeerJS();
        };

        // --- Core Mesh Logic ---
        function initPeerJS() {
            searchingUI.style.display = 'flex';

            peer = new Peer(ROOM_ID, peerConfig);

            peer.on('connection', (conn) => handleNewConnection(conn));
            peer.on('call', (call) => handleNewCall(call));

            peer.on('open', (id) => {
                myId = id;
                isHost = true;
                statusText.innerText = "Host Ready";
                statusText.style.color = "#00e676";
                
                addSystemMsg(`You created the room as <b>${myName}</b>`);
                addUserToSidebar(myName, "me"); 
                enableChat();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer = new Peer(peerConfig); 
                    
                    peer.on('connection', (conn) => handleNewConnection(conn));
                    peer.on('call', (call) => handleNewCall(call));
                    
                    peer.on('open', (id) => {
                        myId = id;
                        isHost = false;
                        statusText.innerText = "Connected to Mesh";
                        statusText.style.color = "#00e676";

                        addSystemMsg(`You joined the room as <b>${myName}</b>`);
                        addUserToSidebar(myName, "me"); 
                        
                        connectToPeer(ROOM_ID); 
                        enableChat();
                    });
                } else {
                    console.error("PeerJS Error:", err);
                }
            });
        }

        function connectToPeer(targetId) {
            if (connections[targetId] || targetId === myId) return;
            const conn = peer.connect(targetId);
            handleNewConnection(conn);

            // Call them with Mic (Tagged as audio)
            if (localStream) {
                const call = peer.call(targetId, localStream, { metadata: { type: 'audio' } });
                handleNewCall(call);
            }
        }

        function handleNewConnection(conn) {
            const setupData = () => {
                searchingUI.style.display = 'none';
                connections[conn.peer] = conn;
                
                conn.send({ type: 'name', value: myName });

                if (isHost) {
                    const otherPeers = Object.keys(connections).filter(id => id !== conn.peer);
                    if (otherPeers.length > 0) {
                        conn.send({ type: 'peer-list', peers: otherPeers });
                    }
                }

                // If WE are already sharing our screen, force-call the new person with it!
                if (screenStream) {
                    const screenCall = peer.call(conn.peer, screenStream, { metadata: { type: 'screenshare' } });
                    screenCalls[conn.peer] = screenCall;
                }
            };

            if (conn.open) setupData();
            else conn.on('open', setupData);

            conn.on('data', (data) => {
                const senderId = conn.peer;

                if (data.type === 'name') {
                    peerNames[senderId] = data.value;
                    addUserToSidebar(data.value, senderId);
                    addSystemMsg(`<b>${data.value}</b> joined the mesh.`);
                    playJoinSound();
                } 
                else if (data.type === 'peer-list' || data.type === 'mesh-sync') {
                    data.peers.forEach(peerId => {
                        if (peerId !== myId && !connections[peerId]) connectToPeer(peerId);
                    });
                } 
                else if (data.type === 'text') {
                    addMessage(data.value, peerNames[senderId] || "Unknown", 'theirs');
                } 
                else if (data.type === 'ping') {
                    conn.send({ type: 'pong', time: data.time }); 
                } 
                else if (data.type === 'pong') {
                    updatePingUI(senderId, Date.now() - data.time);
                }
                else if (data.type === 'file-meta') {
                    fileTransfers[senderId] = { meta: data, chunks: [], received: 0 };
                    addSystemMsg(`Receiving ${data.name} from ${peerNames[senderId]}...`);
                } 
                else if (data.type === 'file-chunk') {
                    const transfer = fileTransfers[senderId];
                    if (!transfer) return;

                    transfer.chunks.push(data.data);
                    transfer.received += data.data.byteLength;
                    
                    if (transfer.received >= transfer.meta.size) {
                        const blob = new Blob(transfer.chunks, { type: transfer.meta.fileType });
                        const url = URL.createObjectURL(blob);
                        
                        if (transfer.meta.fileType.startsWith('image/')) {
                            addMessage(`<img src="${url}">`, peerNames[senderId], 'theirs');
                        } else {
                            addMessage(`<div>📂 ${transfer.meta.name}</div><a href="${url}" download="${transfer.meta.name}" style="color: #00e676; display:block; margin-top:5px;">Download</a>`, peerNames[senderId], 'theirs');
                        }
                        delete fileTransfers[senderId]; 
                    }
                }
            });

            conn.on('close', () => removePeer(conn.peer));
            conn.on('error', () => removePeer(conn.peer));
        }

        // --- Handle Incoming Calls (Mic or Screen) ---
        function handleNewCall(call) {
            // Check if it's a Screenshare
            if (call.metadata && call.metadata.type === 'screenshare') {
                call.answer(); // Just accept, don't send anything back
                call.on('stream', (remoteStream) => {
                    addVideoElement(call.peer, remoteStream, false);
                });
                call.on('close', () => {
                    document.getElementById('video-' + call.peer)?.remove();
                });
                return;
            }

            // Otherwise, it's a standard Audio Call
            if (localStream) call.answer(localStream);
            else call.answer(); 

            call.on('stream', (remoteStream) => {
                if (!document.getElementById('audio-' + call.peer)) {
                    const audio = new Audio();
                    audio.id = 'audio-' + call.peer;
                    audio.srcObject = remoteStream;
                    audio.autoplay = true;
                    document.body.appendChild(audio);
                }
            });
        }

        function removePeer(peerId) {
            if (connections[peerId]) {
                const name = peerNames[peerId] || "Someone";
                addSystemMsg(`<b>${name}</b> left the conference.`);
                playLeaveSound();
                
                delete connections[peerId];
                delete peerNames[peerId];
                delete fileTransfers[peerId];
                
                document.getElementById(`sidebar-${peerId}`)?.remove();
                document.getElementById(`audio-${peerId}`)?.remove();
                document.getElementById(`video-${peerId}`)?.remove();

                if (screenCalls[peerId]) {
                    screenCalls[peerId].close();
                    delete screenCalls[peerId];
                }
            }
            if (Object.keys(connections).length === 0) {
                searchingUI.style.display = 'flex';
            }
        }

        // --- Screenshare Logic ---
        screenBtn.onclick = async () => {
            if (screenStream) {
                stopScreenShare();
                return;
            }

            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                screenBtn.classList.add('active');
                
                addVideoElement('me', screenStream, true); // Show it locally

                // Handle the native browser "Stop Sharing" button
                screenStream.getVideoTracks()[0].onended = stopScreenShare;

                // Fire off a new call to everyone with the screen
                Object.keys(connections).forEach(peerId => {
                    const call = peer.call(peerId, screenStream, { metadata: { type: 'screenshare' } });
                    screenCalls[peerId] = call;
                });
            } catch (err) {
                console.error("Screenshare cancelled or failed", err);
            }
        };

        function stopScreenShare() {
            if (!screenStream) return;
            screenStream.getTracks().forEach(t => t.stop());
            Object.values(screenCalls).forEach(call => call.close());
            
            screenCalls = {};
            screenStream = null;
            
            screenBtn.classList.remove('active');
            document.getElementById('video-me')?.remove();
        }

        function addVideoElement(id, stream, isLocal) {
            if (document.getElementById('video-' + id)) return;
            const video = document.createElement('video');
            video.id = 'video-' + id;
            video.className = 'screen-video';
            video.srcObject = stream;
            video.autoplay = true;
            if (isLocal) video.muted = true; // Don't echo our own system audio
            videoGrid.appendChild(video);
        }

        // --- Chat & Data ---
        function broadcastData(dataObj) {
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send(dataObj);
            });
        }

        sendBtn.onclick = () => {
            const text = msgInput.value;
            if (!text || Object.keys(connections).length === 0) return;
            
            broadcastData({ type: 'text', value: text });
            addMessage(text, "You", 'mine');
            msgInput.value = "";
        };

        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if (!file || Object.keys(connections).length === 0) return;
            
            addSystemMsg(`Sending ${file.name} to network...`);
            broadcastData({ type: 'file-meta', name: file.name, fileType: file.type, size: file.size });
            
            const chunkSize = 16 * 1024; 
            let offset = 0;
            
            while (offset < file.size) {
                const chunk = file.slice(offset, offset + chunkSize);
                const buffer = await chunk.arrayBuffer();
                for (let conn of Object.values(connections)) {
                    if (conn.open && conn.dataChannel) {
                        while (conn.dataChannel.bufferedAmount > 1024 * 1024) {
                            await new Promise(r => setTimeout(r, 50));
                        }
                    }
                }
                broadcastData({ type: 'file-chunk', data: buffer });
                offset += chunkSize;
            }
            
            if (file.type.startsWith('image/')) {
                const localUrl = URL.createObjectURL(file);
                addMessage(`<img src="${localUrl}">`, "You sent a photo", 'mine');
            } else {
                addMessage(`<div>📂 Shared file: ${file.name}</div>`, "You", 'mine');
            }
            fileInput.value = ""; 
        };

        // --- Mesh Sync & Ping Loop ---
        setInterval(() => {
            if (isHost) {
                const activePeers = Object.keys(connections);
                if (activePeers.length > 0) broadcastData({ type: 'mesh-sync', peers: activePeers });
            }
            broadcastData({ type: 'ping', time: Date.now() });
        }, 3000); 

        function updatePingUI(peerId, latency) {
            const pingEl = document.getElementById(`ping-${peerId}`);
            if (pingEl) {
                pingEl.innerText = `${latency}ms`;
                pingEl.className = 'ping-display ' + (latency < 100 ? 'ping-good' : latency < 300 ? 'ping-med' : 'ping-bad');
            }
        }

        // --- UI Updates ---
        function enableChat() { msgInput.disabled = false; sendBtn.disabled = false; }

        muteBtn.onclick = () => {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            muteBtn.innerHTML = isMuted ? "🔇" : "🎤";
            muteBtn.classList.toggle('active', isMuted);
        };

        document.getElementById('logout-btn').onclick = () => {
            if (peer) peer.destroy();
            location.reload(); 
        };

        function addMessage(content, user, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<div class="msg-info">${user}</div><div>${content}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMsg(text) {
            const div = document.createElement('div');
            div.style.textAlign = "center"; div.style.fontSize = "12px"; div.style.color = "#666"; div.style.margin = "10px 0";
            div.innerHTML = text;
            messagesDiv.appendChild(div);
        }

        function addUserToSidebar(name, id) {
            if (document.getElementById(`sidebar-${id}`)) {
                document.getElementById(`name-${id}`).innerText = name;
                return;
            }

            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = `sidebar-${id}`;
            
            let displayName = name;
            let rightSideHtml = '';

            if (id === "me") {
                displayName += " (You)";
                rightSideHtml = isHost ? `<span class="host-badge">Host</span>` : `<span class="guest-badge">Guest</span>`;
            } else if (id === ROOM_ID) {
                rightSideHtml = `<span class="host-badge">Host</span> <span id="ping-${id}" class="ping-display ping-med">-- ms</span>`;
            } else {
                rightSideHtml = `<span class="guest-badge">Guest</span> <span id="ping-${id}" class="ping-display ping-med">-- ms</span>`;
            }

            div.innerHTML = `
                <div class="user-left">
                    <div class="status-dot"></div> 
                    <span id="name-${id}">${displayName}</span>
                </div>
                <div style="display:flex; gap:8px; align-items:center;">
                    ${rightSideHtml}
                </div>
            `;
            userList.appendChild(div);
        }
    </script>
</body>
</html>
