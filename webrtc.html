<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Fidelity WebRTC Conference</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cursor-fx"></div>

    <div id="login-screen">
        <h1>🚀 Super Mesh Chat</h1>
        <p style="color:#949ba4; margin-top: 0; margin-bottom: 5px; font-weight: 500;">Multi-User Conference Room</p>
        <p id="online-users" style="color:#23a559; font-size: 13px; font-weight: 600; margin-top: 0; margin-bottom: 25px;">Checking room status...</p>
        <input type="text" id="username" placeholder="Your Name">
        <input type="password" id="room-pass" placeholder="Room Password">
        <button id="join-btn">Join Room</button>
    </div>

    <div class="sidebar">
        <h3>
            <span>👥 Super Mesh Chat</span>
            <span id="room-clock" style="font-size: 11px; color: #fff; display: none; text-align: right; line-height: 1.3; text-transform: none;"></span>
        </h3>
        <div id="user-list"></div>
        <div id="searching-container">
            <div class="radar"></div>
            <div>Waiting for peers...<br><span style="font-size:11px; opacity:0.7;">Share password to invite</span></div>
        </div>
        <div class="sidebar-footer">
            <div style="color: #949ba4; font-size: 12px; font-weight: 500; text-align: center; background: #111214; padding: 8px; border-radius: 8px;">Network: <span id="conn-status" style="color: #f0b232;">Connecting...</span></div>
            <button id="logout-btn">Leave Room</button>
        </div>
    </div>

    <div class="main-area">
        <div id="drop-overlay">
            <div style="font-size: 48px; margin-bottom: 12px;">📥</div>
            Drop to Share or Play
        </div>
        
        <div id="video-grid"></div>
        <div id="messages"></div>
        
        <div id="typing-indicator"></div>
        
        <div class="input-bar">
            <button id="cursor-btn" class="media-btn" title="Cursor Effects">✨</button>
            <button id="cam-btn" class="media-btn" title="Toggle Webcam">📷</button>
            <button id="screen-btn" class="media-btn" title="Share Screen">🖥️</button>
            
            <input type="file" id="soundboard-input" accept="audio/*" style="display: none;">
            <label for="soundboard-input" class="media-btn highlight-hover" title="Soundboard">🎵</label>
            
            <input type="file" id="file-input" style="display: none;">
            <label for="file-input" class="media-btn highlight-hover" title="Send File/Photo">📎</label>
            
            <input type="text" id="msg-input" placeholder="Type a message (or Drag/Paste files)..." disabled>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
