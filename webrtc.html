<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Fidelity WebRTC Chat (Manual P2P)</title>
    <style>
        /* Modern Dark Theme */
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Sidebar (Login & Users) */
        .sidebar { width: 250px; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; position: relative; }
        .main-area { flex: 1; display: flex; flex-direction: column; height: 100%; }

        /* Login Section (Updated for Manual Signaling) */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px;}
        .signaling-box { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; width: 400px; max-width: 90%; text-align: center; margin-bottom: 20px; }
        input[type="text"] { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none; margin-bottom: 10px; width: 80%; text-align: center; font-size: 16px; }
        textarea { width: 100%; height: 80px; background: #222; color: #00e676; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; resize: none; margin-bottom: 10px; box-sizing: border-box; word-break: break-all; }
        button { padding: 12px 24px; border-radius: 8px; border: none; background: #00e676; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; margin: 5px; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }
        .flex-row { display: flex; justify-content: center; gap: 10px; width: 100%; }

        /* Sidebar Controls */
        .sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        #logout-btn { background: #d32f2f; color: white; padding: 8px; width: 100%; font-size: 13px; }

        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: #00e676; color: black; border-bottom-right-radius: 2px; }
        .msg.theirs { align-self: flex-start; background: #333; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .msg-info { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }

        /* Input Area */
        .input-bar { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        #msg-input { flex: 1; text-align: left; }
        
        /* Utility Buttons */
        .icon-btn { background: transparent; color: #888; font-size: 20px; padding: 5px 10px; }
        .icon-btn:hover { background: #333; color: white; }
        #mute-btn { background: #252525; color: #00e676; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 20px; padding: 0; }
        #mute-btn.muted { background: #d32f2f; color: white; }
        .file-label { cursor: pointer; font-size: 20px; padding: 10px; color: #888; }
        .file-label:hover { color: white; }
        
        /* User List */
        .user-item { padding: 10px; background: #252525; margin-bottom: 5px; border-radius: 5px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; background: #00e676; border-radius: 50%; }

        /* Searching Animation */
        #searching-container { margin-top: 20px; padding: 20px; text-align: center; color: #666; font-size: 13px; display: none; flex-direction: column; align-items: center; gap: 15px; }
        .radar { width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 230, 118, 0.2); position: relative; }
        .radar::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: #00e676; border-radius: 50%; box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 230, 118, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="signaling-box">
            <h1>🚀 Super Chat</h1>
            <p style="color:#888; font-size: 13px; margin-top:-10px;">Zero-Dependency P2P Engine</p>
            
            <input type="text" id="username" placeholder="Enter your name">
            
            <div id="step-0" class="flex-row">
                <button id="btn-host" style="flex:1;">Create Room (Host)</button>
                <button id="btn-join" style="flex:1; background:#444; color:white;">Join Room (Guest)</button>
            </div>

            <div id="host-ui" style="display: none; text-align: left; margin-top: 15px;">
                <p style="font-size: 14px; margin-bottom: 5px;">1. Send this code to your friend:</p>
                <textarea id="host-offer" readonly placeholder="Generating code... please wait a few seconds."></textarea>
                <button id="btn-copy-offer" style="width:100%; font-size:12px; padding:8px;">📋 Copy My Code</button>
                
                <p style="font-size: 14px; margin-bottom: 5px; margin-top: 15px;">2. Paste their reply here:</p>
                <textarea id="host-answer" placeholder="Paste your friend's code here..."></textarea>
                <button id="btn-connect-host" style="width:100%;">Connect</button>
            </div>

            <div id="guest-ui" style="display: none; text-align: left; margin-top: 15px;">
                <p style="font-size: 14px; margin-bottom: 5px;">1. Paste Host's code here:</p>
                <textarea id="guest-offer" placeholder="Paste the code your friend sent you..."></textarea>
                <button id="btn-generate-answer" style="width:100%;">Generate Reply</button>
                
                <div id="guest-step-2" style="display: none;">
                    <p style="font-size: 14px; margin-bottom: 5px; margin-top: 15px;">2. Send this reply back to the Host:</p>
                    <textarea id="guest-answer" readonly placeholder="Generating reply..."></textarea>
                    <button id="btn-copy-answer" style="width:100%; font-size:12px; padding:8px;">📋 Copy Reply</button>
                    <p style="color:#888; font-size:12px; text-align:center; margin-top:10px;">Waiting for host to connect...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <h3>👥 Users</h3>
        <div id="user-list"></div>
        <div id="searching-container">
            <div class="radar"></div>
            <div>Waiting for connection...</div>
        </div>
        <div class="sidebar-footer">
            <div style="color: #666; font-size: 12px; text-align: center;">
                Status: <span id="status-indicator" style="color: #ffeb3b;">Connecting...</span>
            </div>
            <button id="logout-btn">Leave</button>
        </div>
    </div>

    <div class="main-area">
        <div id="messages"></div>
        <div class="input-bar">
            <button id="mute-btn" title="Toggle Mic">🎤</button>
            <input type="file" id="file-input" style="display: none;">
            <label for="file-input" class="file-label" title="Send File/Photo">📎</label>
            <input type="text" id="msg-input" placeholder="Type a message..." disabled>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script>
        // --- NATIVE WEB AUDIO SFX ---
        function playBeep(freq, type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } catch (e) { }
        }
        const playJoinSound = () => playBeep(880, 'sine'); 
        const playLeaveSound = () => playBeep(440, 'triangle'); 

        // --- DOM Elements ---
        const loginScreen = document.getElementById('login-screen');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const muteBtn = document.getElementById('mute-btn');
        const userList = document.getElementById('user-list');
        const searchingUI = document.getElementById('searching-container');
        const statusIndicator = document.getElementById('status-indicator');

        // --- State Variables ---
        let myName = "Anon";
        let theirName = "Friend";
        let localStream = null;
        let isMuted = false;
        let peerConnection;
        let dataChannel;

        // WebRTC Configuration (Using free Google STUN to get through networks)
        const servers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // --- Setup Microphone ---
        async function getMic() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            } catch (err) {
                console.warn("No mic found or permission denied.");
                muteBtn.style.display = 'none';
            }
        }

        // --- Initialize WebRTC Connection ---
        function initWebRTC() {
            peerConnection = new RTCPeerConnection(servers);

            // Play incoming audio
            peerConnection.ontrack = (event) => {
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.autoplay = true;
            };

            // Add our mic to the connection
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }

            // Connection state changes
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    handleSuccessfulConnection();
                } else if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    addSystemMsg(`${theirName} disconnected.`);
                    playLeaveSound();
                    document.getElementById(`sidebar-them`).remove();
                    statusIndicator.innerText = "Disconnected";
                    statusIndicator.style.color = "#f44336";
                }
            };
        }

        // --- Setup Data Channel Events (Chat & Files) ---
        function setupDataChannel(channel) {
            dataChannel = channel;
            dataChannel.onopen = () => {
                // Send our name immediately when channel opens
                dataChannel.send(JSON.stringify({ type: 'name', value: myName }));
            };
            
            dataChannel.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'text') {
                    addMessage(data.value, theirName, 'theirs');
                } else if (data.type === 'name') {
                    theirName = data.value;
                    document.getElementById('name-them').innerText = theirName;
                    addSystemMsg(`${theirName} joined the room!`);
                    playJoinSound();
                } else if (data.type === 'file') {
                    handleReceivedFile(data);
                }
            };
        }

        function handleSuccessfulConnection() {
            loginScreen.style.display = 'none';
            searchingUI.style.display = 'none';
            msgInput.disabled = false;
            sendBtn.disabled = false;
            statusIndicator.innerText = "Connected";
            statusIndicator.style.color = "#00e676";
            
            addSystemMsg(`You joined as <b>${myName}</b>`);
            addUserToSidebar("You (Me)", "me");
            addUserToSidebar(theirName, "them"); // Name updates when they send it over data channel
        }

        // ==========================================
        // UI FLOW: HOST (Creates the Room)
        // ==========================================
        document.getElementById('btn-host').onclick = async () => {
            myName = document.getElementById('username').value.trim() || "Host";
            document.getElementById('step-0').style.display = 'none';
            document.getElementById('host-ui').style.display = 'block';

            await getMic();
            initWebRTC();

            // Host MUST create the data channel before the offer
            const channel = peerConnection.createDataChannel('chat');
            setupDataChannel(channel);

            // Create Offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            // Wait for ICE candidates to finish gathering so we can generate ONE single copyable code
            peerConnection.onicecandidate = (event) => {
                if (event.candidate === null) {
                    // Gathering complete. Turn the full session description into a Base64 string to make it easy to copy
                    const code = btoa(JSON.stringify(peerConnection.localDescription));
                    document.getElementById('host-offer').value = code;
                }
            };
        };

        document.getElementById('btn-copy-offer').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('host-offer').value);
            document.getElementById('btn-copy-offer').innerText = "✅ Copied!";
        };

        // Host Final Step: Paste Answer and Connect
        document.getElementById('btn-connect-host').onclick = async () => {
            const answerCode = document.getElementById('host-answer').value.trim();
            if (!answerCode) return alert("Paste your friend's code first!");
            try {
                const answerDesc = JSON.parse(atob(answerCode));
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answerDesc));
                document.getElementById('btn-connect-host').innerText = "Connecting...";
            } catch (e) {
                alert("Invalid code format. Make sure you copied the whole thing!");
            }
        };

        // ==========================================
        // UI FLOW: GUEST (Joins the Room)
        // ==========================================
        document.getElementById('btn-join').onclick = () => {
            myName = document.getElementById('username').value.trim() || "Guest";
            document.getElementById('step-0').style.display = 'none';
            document.getElementById('guest-ui').style.display = 'block';
        };

        document.getElementById('btn-generate-answer').onclick = async () => {
            const offerCode = document.getElementById('guest-offer').value.trim();
            if (!offerCode) return alert("Paste the Host's code first!");

            document.getElementById('btn-generate-answer').innerText = "Generating...";

            await getMic();
            initWebRTC();

            // Guest listens for the host's data channel
            peerConnection.ondatachannel = (event) => {
                setupDataChannel(event.channel);
            };

            try {
                const offerDesc = JSON.parse(atob(offerCode));
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDesc));

                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                // Wait for ICE candidates to gather
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate === null) {
                        const code = btoa(JSON.stringify(peerConnection.localDescription));
                        document.getElementById('guest-answer').value = code;
                        document.getElementById('btn-generate-answer').style.display = 'none';
                        document.getElementById('guest-step-2').style.display = 'block';
                    }
                };
            } catch (e) {
                alert("Invalid Host code. Make sure you copied the whole thing!");
                document.getElementById('btn-generate-answer').innerText = "Generate Reply";
            }
        };

        document.getElementById('btn-copy-answer').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('guest-answer').value);
            document.getElementById('btn-copy-answer').innerText = "✅ Copied! Send it to Host";
            
            // Show the main UI in the background while waiting for host to paste
            loginScreen.style.background = "rgba(18, 18, 18, 0.95)";
            searchingUI.style.display = 'flex';
        };

        // ==========================================
        // CHAT & APP LOGIC
        // ==========================================

        sendBtn.onclick = () => {
            const text = msgInput.value;
            if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
            dataChannel.send(JSON.stringify({ type: 'text', value: text }));
            addMessage(text, "You", 'mine');
            msgInput.value = "";
        };

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Simple Base64 File Transfer (Works well for images and small files)
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (!file || !dataChannel || dataChannel.readyState !== 'open') return;
            
            addSystemMsg(`Sending ${file.name}...`);
            const reader = new FileReader();
            
            reader.onload = (e) => {
                const base64Data = e.target.result;
                try {
                    dataChannel.send(JSON.stringify({ type: 'file', name: file.name, fileType: file.type, data: base64Data }));
                    if (file.type.startsWith('image/')) {
                        addMessage(`<img src="${base64Data}">`, "You sent a photo", 'mine');
                    } else {
                        addMessage(`<div>📂 Shared file: ${file.name}</div>`, "You", 'mine');
                    }
                } catch (err) {
                    alert("File is too large to send manually over this channel. Try a smaller file or image.");
                }
            };
            reader.readAsDataURL(file);
            fileInput.value = ""; 
        };

        muteBtn.onclick = () => {
            if (!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            isMuted = !isMuted;
            audioTrack.enabled = !isMuted;
            muteBtn.innerHTML = isMuted ? "🔇" : "🎤";
            if (isMuted) muteBtn.classList.add('muted');
            else muteBtn.classList.remove('muted');
        };

        document.getElementById('logout-btn').onclick = () => {
            if (peerConnection) peerConnection.close();
            location.reload(); 
        };

        // --- UI Helpers ---
        function addMessage(content, user, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<div class="msg-info">${user}</div><div>${content}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleReceivedFile(dataObj) {
            if (dataObj.fileType.startsWith('image/')) {
                addMessage(`<img src="${dataObj.data}">`, theirName, 'theirs');
            } else {
                addMessage(`<div>📂 ${dataObj.name}</div><a href="${dataObj.data}" download="${dataObj.name}" style="color: #00e676; display:block; margin-top:5px;">Download</a>`, theirName, 'theirs');
            }
        }

        function addSystemMsg(text) {
            const div = document.createElement('div');
            div.style.textAlign = "center"; div.style.fontSize = "12px"; div.style.color = "#666"; div.style.margin = "10px 0";
            div.innerHTML = text;
            messagesDiv.appendChild(div);
        }

        function addUserToSidebar(name, id) {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = `sidebar-${id}`;
            div.innerHTML = `<div class="status-dot"></div> <span id="name-${id}">${name}</span>`;
            userList.appendChild(div);
        }
    </script>
</body>
</html>
